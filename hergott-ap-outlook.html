<html lang="en">

<title>Hergott Farm Equipment — AP Invoice Processor</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:#E8E5DF;color:#1A1A18;font-size:13px;line-height:1.5}

/* ── Setup Screen ── */
.setup-overlay{position:fixed;inset:0;background:#1B3D2B;display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.setup-card{background:#fff;border-radius:8px;padding:36px 40px;max-width:580px;width:100%;box-shadow:0 24px 64px rgba(0,0,0,0.35);max-height:92vh;overflow-y:auto}
.setup-logo{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:800;color:#1B3D2B;letter-spacing:-0.5px;margin-bottom:2px}
.setup-sub{font-size:11px;color:#AAA;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:28px}
.setup-step{margin-bottom:22px}
.setup-step-title{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;color:#1B3D2B;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid #EEE}
.setup-steps{font-size:12px;color:#555;line-height:1.9;background:#F5F3EF;padding:11px 14px;border-radius:4px;margin-bottom:10px}
.setup-steps code{font-family:'DM Mono',monospace;background:#E2DED8;padding:1px 5px;border-radius:3px;font-size:11px;color:#1A1A18}
.field-group{margin-bottom:11px}
.field-label{font-size:10px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px}
.field-input{width:100%;padding:8px 10px;border:1.5px solid #D0CEC9;border-radius:4px;font-size:12px;font-family:'DM Mono',monospace;background:#FAFAFA;color:#1A1A18;outline:none;transition:border-color 0.15s}
.field-input:focus{border-color:#1B3D2B;background:#fff}
.field-hint{font-size:10px;color:#AAA;margin-top:3px}
.btn-setup-save{width:100%;padding:12px;background:#1B3D2B;color:#fff;border:none;border-radius:5px;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;letter-spacing:0.08em;cursor:pointer;text-transform:uppercase;margin-top:8px;transition:background 0.15s}
.btn-setup-save:hover{background:#142E20}
.btn-setup-save:disabled{background:#B0B0B0;cursor:not-allowed}

/* ── App Shell ── */
.app{height:100vh;display:flex;flex-direction:column;overflow:hidden}
.app-header{background:#1B3D2B;color:#fff;padding:0 18px;height:50px;display:flex;align-items:center;gap:14px;flex-shrink:0}
.app-logo{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;letter-spacing:-0.3px;white-space:nowrap}
.app-logo span{color:#7DC4A0;font-weight:600}
.header-divider{width:1px;height:22px;background:rgba(255,255,255,0.15)}
.header-sub{font-size:11px;color:#7DC4A0;letter-spacing:0.04em;white-space:nowrap}
.header-spacer{flex:1}
.header-user{font-size:12px;color:#A8D5BC;display:flex;align-items:center;gap:10px}
.btn-sign-in{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.25);color:#fff;padding:6px 16px;border-radius:4px;font-size:12px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:0.06em;cursor:pointer;text-transform:uppercase;transition:background 0.15s;white-space:nowrap}
.btn-sign-in:hover{background:rgba(255,255,255,0.22)}
.btn-sign-out{background:none;border:none;color:#7DC4A0;font-size:11px;cursor:pointer;text-decoration:underline;padding:0}
.btn-gear{background:none;border:none;color:#7DC4A0;font-size:17px;cursor:pointer;padding:4px 6px;opacity:0.7;transition:opacity 0.15s}
.btn-gear:hover{opacity:1}
.app-body{flex:1;display:flex;overflow:hidden}

/* ── Left Panel ── */
.left-panel{width:372px;flex-shrink:0;display:flex;flex-direction:column;border-right:1px solid #D0CEC9;background:#EAE7E1;overflow:hidden}
.tabs{display:flex;background:#E0DDD7;border-bottom:1px solid #D0CEC9}
.tab{flex:1;padding:10px 6px;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;cursor:pointer;color:#999;border-bottom:2px solid transparent;transition:all 0.15s;background:none;border-top:none;border-left:none;border-right:none}
.tab.active{color:#1B3D2B;border-bottom-color:#1B3D2B;background:#EAE7E1}
.tab:hover:not(.active){color:#555}

.panel-section{padding:13px 14px;border-bottom:1px solid #D0CEC9}
.section-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:9px}

/* Outlook tab */
.folder-row{display:flex;gap:7px;margin-bottom:7px}
.folder-select{flex:1;padding:6px 8px;border:1px solid #D0CEC9;border-radius:4px;font-size:12px;background:#fff;color:#1A1A18;outline:none;cursor:pointer}
.btn-scan{padding:6px 14px;background:#1B3D2B;color:#fff;border:none;border-radius:4px;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;cursor:pointer;white-space:nowrap;transition:background 0.15s;display:flex;align-items:center;gap:5px}
.btn-scan:hover{background:#142E20}
.btn-scan:disabled{background:#B5B5B5;cursor:not-allowed}

.email-list{max-height:200px;overflow-y:auto;border:1px solid #D0CEC9;border-radius:4px;background:#fff}
.email-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-bottom:1px solid #ECEAE6;cursor:pointer;transition:background 0.1s}
.email-item:last-child{border-bottom:none}
.email-item:hover{background:#F2F0EB}
.email-info{flex:1;min-width:0}
.email-subject{font-size:12px;font-weight:600;color:#1A1A18;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.email-meta{font-size:10px;color:#AAA;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.email-badge{background:#E0EDE6;color:#1B3D2B;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;white-space:nowrap;flex-shrink:0}
.btn-email-add{padding:4px 10px;background:#fff;border:1px solid #C0CEC5;color:#1B3D2B;border-radius:3px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:background 0.1s}
.btn-email-add:hover{background:#E0EDE6}
.no-emails{padding:16px;text-align:center;font-size:12px;color:#BBB}

/* Drop tab */
.drop-zone{border:2px dashed #B8B5B0;border-radius:6px;padding:28px 20px;text-align:center;background:#fff;cursor:pointer;transition:all 0.15s;user-select:none}
.drop-zone.active{border-color:#1B3D2B;background:#EAF2EE}
.drop-zone-icon{font-size:30px;margin-bottom:8px}
.drop-zone-text{font-size:13px;font-weight:600;color:#555;margin-bottom:3px}
.drop-zone-hint{font-size:11px;color:#AAA}

/* Queue */
.queue-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
.queue-header{padding:9px 14px 8px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #D0CEC9;background:#EAE7E1;position:sticky;top:0;z-index:1;flex-shrink:0}
.queue-label{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;color:#777;text-transform:uppercase;letter-spacing:0.07em;flex:1}
.btn-extract-all{padding:5px 13px;background:#2D6A4F;color:#fff;border:none;border-radius:3px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;gap:5px;transition:background 0.15s;white-space:nowrap}
.btn-extract-all:hover{background:#1B3D2B}
.btn-extract-all:disabled{background:#B5B5B5;cursor:not-allowed}
.queue-list{flex:1;overflow-y:auto}
.queue-item{display:flex;align-items:center;gap:8px;padding:9px 12px;border-bottom:1px solid #E4E1DC;background:#fff;transition:background 0.1s}
.queue-item.processing{background:#FFFCF0}
.queue-item.done{background:#F2F8F5}
.queue-item.error{background:#FFF5F5}
.qi-icon{font-size:17px;flex-shrink:0;width:20px;text-align:center}
.qi-info{flex:1;min-width:0}
.qi-name{font-size:11px;font-weight:600;color:#1A1A18;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.qi-source{font-size:10px;color:#AAA;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.qi-status{font-size:10px;font-weight:700;white-space:nowrap;flex-shrink:0}
.qi-status.pending{color:#BBB}
.qi-status.processing{color:#D4A017}
.qi-status.done{color:#2D6A4F}
.qi-status.error{color:#C0392B}
.btn-qi-extract{padding:3px 9px;background:#1B3D2B;color:#fff;border:none;border-radius:3px;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;cursor:pointer;white-space:nowrap;flex-shrink:0}
.btn-qi-extract:hover{background:#142E20}
.btn-qi-remove{background:none;border:none;color:#D0CEC9;font-size:15px;cursor:pointer;padding:2px 4px;flex-shrink:0;line-height:1;transition:color 0.1s}
.btn-qi-remove:hover{color:#C0392B}
.queue-empty{padding:20px;text-align:center;font-size:12px;color:#BBB}

/* ── Right Panel ── */
.right-panel{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px;min-width:0}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#CCC;gap:10px;padding:60px 0}
.empty-icon{font-size:52px}
.empty-text{font-size:15px;font-weight:600}
.empty-hint{font-size:12px;text-align:center;max-width:280px}

/* Review Card */
.review-card{background:#fff;border-radius:6px;border:1px solid #D4D1CB;overflow:hidden;flex-shrink:0}
.rc-head{padding:11px 14px;background:#F5F3EF;border-bottom:1px solid #E6E3DE;display:flex;align-items:center;gap:9px}
.rc-doctype{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:0.07em;padding:2px 8px;border-radius:10px;white-space:nowrap;flex-shrink:0}
.rc-doctype.invoice{background:#D4EDDA;color:#1B5E35}
.rc-doctype.cc{background:#D1ECF1;color:#0B525F}
.rc-doctype.payroll{background:#FDEBD0;color:#6E3200}
.rc-doctype.other{background:#E8E3FC;color:#3B1F7A}
.rc-filename{font-family:'DM Mono',monospace;font-size:11px;color:#999;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rc-conf{padding:3px 9px;border-radius:11px;font-size:11px;font-weight:700;white-space:nowrap;flex-shrink:0}
.rc-conf.high{background:#D4EDDA;color:#1B5E35}
.rc-conf.med{background:#FFF3CD;color:#7A5A00}
.rc-conf.low{background:#F8D7DA;color:#721C24}
.btn-rc-remove{background:none;border:none;color:#CCC;font-size:17px;cursor:pointer;padding:1px 4px;line-height:1;flex-shrink:0;transition:color 0.1s}
.btn-rc-remove:hover{color:#C0392B}

.rc-body{padding:13px 14px}
.rc-fields{display:grid;gap:8px;margin-bottom:14px}
.rc-field{}
.rc-field-label{font-size:10px;font-weight:700;color:#AAA;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:3px}
.rc-input{width:100%;padding:6px 8px;border:1.5px solid #E0DDD7;border-radius:4px;font-family:'DM Mono',monospace;font-size:12px;color:#1A1A18;background:#FAFAFA;outline:none;transition:border-color 0.15s}
.rc-input:focus{border-color:#1B3D2B;background:#fff}
.rc-input.warn{border-color:#E9A825;background:#FFFBF0}
.rc-input.err{border-color:#C0392B;background:#FFF5F5}
.rc-select{width:100%;padding:6px 8px;border:1.5px solid #E0DDD7;border-radius:4px;font-family:'DM Mono',monospace;font-size:11px;color:#1A1A18;background:#fff;outline:none;transition:border-color 0.15s;cursor:pointer}
.rc-select:focus{border-color:#1B3D2B}
.rc-select.warn{border-color:#E9A825}

.rc-section-title{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;color:#777;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.rc-section-title .balance-warn{font-size:11px;color:#C0392B;font-weight:700;font-family:'DM Sans',sans-serif;text-transform:none;letter-spacing:0}

.gl-table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:8px}
.gl-table th{padding:5px 7px;background:#F5F3EF;color:#999;font-weight:700;text-transform:uppercase;font-size:10px;letter-spacing:0.05em;border-bottom:1.5px solid #E6E3DE;text-align:left}
.gl-table th.r{text-align:right}
.gl-table td{padding:5px 7px;border-bottom:1px solid #F0EDE8;vertical-align:middle}
.gl-table tr:last-child td{border-bottom:none}
.gl-table tr:hover td{background:#FAFAF8}
.td-input{width:100%;border:none;background:transparent;font-family:'DM Mono',monospace;font-size:11px;color:#1A1A18;padding:0;outline:none;min-width:0}
.td-input:focus{background:#F5F3EF;border-radius:2px;padding:0 2px}
.td-select{width:100%;border:none;background:transparent;font-family:'DM Mono',monospace;font-size:11px;color:#1A1A18;padding:0;outline:none;cursor:pointer;min-width:0}
.td-select:focus{background:#F5F3EF}
.td-r{text-align:right}
.td-amt input{text-align:right}
.conf-dot{display:inline-block;width:8px;height:8px;border-radius:50%;flex-shrink:0}
.conf-dot.high{background:#2ECC71}
.conf-dot.med{background:#F39C12}
.conf-dot.low{background:#E74C3C}
.btn-add-line{padding:5px 12px;background:#fff;border:1.5px dashed #C0C8C4;color:#1B3D2B;border-radius:4px;font-size:11px;font-weight:600;cursor:pointer;transition:all 0.15s;margin-bottom:2px}
.btn-add-line:hover{background:#EAF2EE;border-color:#1B3D2B}
.btn-del-line{background:none;border:none;color:#D0CEC9;font-size:14px;cursor:pointer;padding:0 2px;line-height:1;transition:color 0.1s}
.btn-del-line:hover{color:#C0392B}

.rc-warnings{padding:8px 14px;background:#FFFBF0;border-top:1px solid #F5E27A}
.rc-warn-item{font-size:11px;color:#7A5A00;padding:2px 0}
.rc-warn-item::before{content:"⚠ "}
.rc-notes{padding:8px 14px;background:#EAF4F0;border-top:1px solid #A8D5BC}
.rc-note-item{font-size:11px;color:#1B5E35;padding:2px 0}
.rc-note-item::before{content:"ℹ "}

.rc-footer{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#F5F3EF;border-top:1px solid #E6E3DE}
.rc-footer-label{font-size:12px;color:#777}
.rc-total{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;color:#1B3D2B}
.rc-mismatch-warn{font-size:11px;color:#C0392B;font-weight:700}

/* Export Bar */
.export-bar{background:#fff;border-radius:6px;border:1px solid #D4D1CB;padding:13px 16px;display:flex;align-items:center;gap:16px;flex-shrink:0}
.export-info{flex:1;font-size:12px;color:#666}
.export-info strong{color:#1A1A18}
.export-info .blocked{color:#C0392B;font-weight:600}
.export-info .clear{color:#1B5E35;font-weight:600}
.btn-export{padding:10px 26px;background:#1B3D2B;color:#fff;border:none;border-radius:5px;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;letter-spacing:0.07em;text-transform:uppercase;cursor:pointer;transition:background 0.15s;white-space:nowrap}
.btn-export:hover{background:#142E20}
.btn-export:disabled{background:#B5B5B5;cursor:not-allowed}

/* Toast */
.toast{position:fixed;bottom:18px;right:18px;padding:11px 16px;border-radius:6px;font-size:12px;font-weight:600;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,0.22);max-width:340px;animation:fadeIn 0.2s}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.toast.success{background:#1B3D2B;color:#fff}
.toast.error{background:#C0392B;color:#fff}
.toast.info{background:#2C3E50;color:#fff}

/* Spinner */
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;width:11px;height:11px;border:2px solid rgba(255,255,255,0.35);border-top-color:#fff;border-radius:50%;animation:spin 0.65s linear infinite;vertical-align:middle}
</style>
</head>

// ── MSAL ─────────────────────────────────────────────────────────────────────
// _msalReady is a Promise that resolves to the initialized PublicClientApplication.
// initialize() is called exactly once; all callers await the same promise.
let _msalReady=null;

function getMsalReady(cfg){
  if(!_msalReady&&cfg.clientId&&cfg.tenantId){
    const inst=new msal.PublicClientApplication({
      auth:{
        clientId:cfg.clientId,
        authority:`https://login.microsoftonline.com/${cfg.tenantId}`,
        redirectUri:`${window.location.origin}${window.location.pathname.replace(/\/[^\/]*$/, '/redirect.html')}`,
      },
      cache:{cacheLocation:'sessionStorage',storeAuthStateInCookie:false},
    });
    // initialize() must be called once before any loginPopup/acquireToken call
    _msalReady=inst.initialize().then(()=>inst);
  }
  return _msalReady||Promise.reject(new Error('MSAL not configured — check clientId and tenantId'));
}

function resetMsal(){ _msalReady=null; }

const SCOPES=['User.Read','Mail.Read'];

async function signIn(cfg){
  const inst=await getMsalReady(cfg);
  const r=await inst.loginPopup({scopes:SCOPES});
  return r.account;
}

async function signOut(cfg){
  try{
    const inst=await getMsalReady(cfg);
    await inst.logoutPopup();
  }catch{}
  resetMsal();
}

async function getToken(cfg,account){
  const inst=await getMsalReady(cfg);
  try{
    // Always try silent first — uses cached token or refresh token
    const r=await inst.acquireTokenSilent({scopes:SCOPES,account});
    return r.accessToken;
  }catch(e){
    // Only fall back to popup when interaction is explicitly required
    // (expired session, consent needed, MFA challenge, etc.)
    // Catching all errors here would cause unnecessary popup prompts
    const isInteractionRequired=
      e instanceof msal.InteractionRequiredAuthError||
      e?.errorCode==='interaction_required'||
      e?.errorCode==='login_required'||
      e?.errorCode==='consent_required';
    if(isInteractionRequired){
      const r=await inst.acquireTokenPopup({scopes:SCOPES,account});
      return r.accessToken;
    }
    throw e; // re-throw non-auth errors (network, config problems, etc.)
  }
}

// ── Graph API ────────────────────────────────────────────────────────────────
async function gGet(path,tok){
  const r=await fetch(`${GRAPH}${path}`,{headers:{Authorization:`Bearer ${tok}`,Accept:'application/json'}});
  if(!r.ok)throw new Error(`Graph ${r.status}: ${(await r.text()).slice(0,200)}`);
  return r.json();
}
async function gBinary(path,tok){
  const r=await fetch(`${GRAPH}${path}`,{headers:{Authorization:`Bearer ${tok}`}});
  if(!r.ok)throw new Error(`Graph binary ${r.status}`);
  const ab=await r.arrayBuffer();
  let b='';const u=new Uint8Array(ab);
  for(let i=0;i<u.length;i+=8192)b+=String.fromCharCode(...u.slice(i,i+8192));
  return btoa(b);
}
async function getMailFolders(tok){
  const d=await gGet('/me/mailFolders?$top=25&$select=id,displayName',tok);
  return d.value||[];
}
async function getUnreadEmails(tok,folderId='inbox'){
  const url=`/me/mailFolders/${folderId}/messages?$filter=isRead eq false and hasAttachments eq true&$select=id,subject,from,receivedDateTime&$top=50&$orderby=receivedDateTime desc`;
  const d=await gGet(url,tok);
  return d.value||[];
}
async function getSharedMailboxEmails(tok,upn){
  const url=`/users/${encodeURIComponent(upn)}/mailFolders/inbox/messages?$filter=isRead eq false and hasAttachments eq true&$select=id,subject,from,receivedDateTime&$top=50&$orderby=receivedDateTime desc`;
  try{
    const d=await gGet(url,tok);
    return(d.value||[]).map(m=>({...m,_mailbox:upn}));
  }catch(e){
    console.warn(`Shared mailbox fetch failed for ${upn}:`,e.message);
    return[];
  }
}
async function getAttachments(tok,msgId,upn){
  const base=upn?`/users/${encodeURIComponent(upn)}`:`/me`;
  const d=await gGet(`${base}/messages/${msgId}/attachments?$select=id,name,contentType,size`,tok);
  return(d.value||[]).filter(a=>a.contentType==='application/pdf'||a.name?.toLowerCase().endsWith('.pdf'));
}
async function getAttachmentB64(tok,msgId,attId,upn){
  const base=upn?`/users/${encodeURIComponent(upn)}`:`/me`;
  try{
    const d=await gGet(`${base}/messages/${msgId}/attachments/${attId}?$select=contentBytes`,tok);
    if(d.contentBytes)return d.contentBytes;
  }catch{}
  return gBinary(`${base}/messages/${msgId}/attachments/${attId}/$value`,tok);
}

async function extractDoc(b64,name,apiKey){

- "payroll_remittance" — CRA payroll remittance advice to Receiver General
- "other" — Describe in notes

STEP 2 — VENDOR IDENTIFICATION:
Search for the vendor's name, address, phone number, or account references. Match to this IntelliDealer vendor master:
${VENDOR_PROMPT}

vendorConfidence scale:
- 1.00 = exact name/address match
- 0.85–0.99 = very likely (recognized company, minor variation)
- 0.65–0.84 = probable match
- below 0.65 = uncertain — flag it

STEP 3 — HEADER DATA:
Invoices: extract invoice number, invoice date (YYYYMMDD), due date (YYYYMMDD — net 30 from invoice date if not stated).
CC statements: extract statement date, period start, period end (all YYYYMMDD), balance due, minimum payment.
payableAcct: "20040" ONLY for CASE, CASEU, or 93724 — "20000" for all other vendors.

STEP 4 — GL CODING (apply precisely):
${GL_RULES}

Rules for every invoice:
- Extract GST (5%) as a SEPARATE GL line to 21450 if shown. Do not fold into other lines.
- Extract PST (6% SK) as a SEPARATE GL line to 21400 if shown.
- For CC statements: code EVERY individual transaction — do not group or skip any.
- Floor plan interest (GL 00900) ALWAYS gets costCentre = "1".
- Do not default to 04000 when a more specific code clearly applies.

STEP 5 — VALIDATE:
Sum all GL line amounts. Must equal invoice total within $0.05.
GST should be ~5% of net. Flag anomalies in warnings array.

RETURN ONLY VALID JSON. No markdown, no explanation before or after.

For supplier_invoice or payroll_remittance:
{"docType":"supplier_invoice","vendorCode":"","vendorName":"","vendorConfidence":0.0,"invoiceNumber":"","invoiceDate":"YYYYMMDD","dueDate":"YYYYMMDD","payableAcct":"20000","invoiceTotal":0.00,"lines":[{"description":"","amount":0.00,"glAcct":"00000","glName":"","costCentre":"","cgCode":"","stockNum":"","confidence":0.0}],"warnings":[],"overallConfidence":0.0,"notes":""}

For cc_statement:
{"docType":"cc_statement","vendorCode":"97392","vendorName":"SCOTIABANK - VISA BOX 4100","vendorConfidence":1.0,"statementDate":"YYYYMMDD","periodStart":"YYYYMMDD","periodEnd":"YYYYMMDD","balanceDue":0.00,"minimumPayment":0.00,"transactions":[{"date":"YYYYMMDD","description":"","amount":0.00,"glAcct":"00000","glName":"","confidence":0.0}],"warnings":[],"overallConfidence":0.0,"notes":""}`;

  let lastErr;
  for(let i=0;i<3;i++){
    if(i>0)await new Promise(r=>setTimeout(r,2000*i));
    try{
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{
          'Content-Type':'application/json',
          'x-api-key':apiKey,
          'anthropic-version':'2023-06-01',
          'anthropic-dangerous-direct-browser-access':'true',
        },
        body:JSON.stringify({
          model:MODEL,max_tokens:8000,
          messages:[{role:'user',content:[
            {type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}},
            {type:'text',text:prompt}
          ]}]
        })
      });
      if(!res.ok){const t=await res.text();throw new Error(`Anthropic ${res.status}: ${t.slice(0,300)}`);}
      const d=await res.json();
      const raw=(d.content||[]).map(c=>c.text||'').join('').trim();
      const clean=raw.replace(/^```json\s*/,'').replace(/\s*```$/,'').trim();
      return JSON.parse(clean);
    }catch(e){lastErr=e;}
  }
  throw lastErr;
}

function csv(v){
  if(v===undefined||v===null)return'';
  const s=String(v);
  return(s.includes(',')||s.includes('"')||s.includes('\n'))?`"${s.replace(/"/g,'""')}"`:`s`==='s'?s:s;
}
function fv(v){const s=String(v===undefined||v===null?'':v);return(s.includes(',')||s.includes('"'))?`"${s.replace(/"/g,'""')}"`:s;}
function addDays(ds,n){
  if(!ds||ds.length!==8)return'';
  const d=new Date(`${ds.slice(0,4)}-${ds.slice(4,6)}-${ds.slice(6,8)}`);
  d.setDate(d.getDate()+n);
  return d.toISOString().slice(0,10).replace(/-/g,'');
}
function buildCSV(results){
  const H='Record ID,Company,Vendor#,Division,Invoice Total,Discount Amount,Invoice #,Bank Cost Center,Bank Account #,Payable Cost Center,Payable Account #,Discount Cost Center,Discount Account #,PO Number,PO Branch,Purchase Date,Due Date,GL Amount,GL Cost Center,GL Account #,Complete Goods Code,Stock #,Description,A/R customer number';
  const rows=[H];let rid=1;
  for(const r of results){
    const isCC=r.docType==='cc_statement';
    const vendor=r.vendorCode||'MISC';
    const payable=r.payableAcct||'20000';
    const total=isCC?r.balanceDue:r.invoiceTotal;
    const invNum=isCC?r.statementDate:r.invoiceNumber;
    const purDate=isCC?r.statementDate:r.invoiceDate;
    const dueDate=isCC?addDays(r.statementDate,30):r.dueDate;
    const lines=isCC?(r.transactions||[]):(r.lines||[]);
    for(const line of lines){
      const glCC=isCC?'':(line.costCentre||'');
      rows.push([
        rid,'01',fv(vendor),'01',fv(total),'',fv(invNum),'','10200','',
        fv(payable),'','582000','','',fv(purDate),fv(dueDate),
        fv(line.amount),fv(glCC),fv(line.glAcct),
        fv(line.cgCode||''),fv(line.stockNum||''),fv(line.description),''
      ].join(','));
    }
    rid++;
  }
  return rows.join('\r\n');
}
function downloadCSV(content,filename){
  const b=new Blob([content],{type:'text/csv;charset=utf-8;'});
  const u=URL.createObjectURL(b);
  const a=document.createElement('a');
  a.href=u;a.download=filename;a.click();
  URL.revokeObjectURL(u);
}

// ── Review Card ───────────────────────────────────────────────────────────────
function ReviewCard({item,result,onUpdate,onRemove}){
  const r=result;
  const isCC=r.docType==='cc_statement';
  const lines=isCC?(r.transactions||[]):(r.lines||[]);
  const total=isCC?r.balanceDue:r.invoiceTotal;
  const sum=lines.reduce((s,l)=>s+(parseFloat(l.amount)||0),0);
  const mismatch=Math.abs(sum-total)>0.05;

  function upField(k,v){onUpdate({...r,[k]:v});}
  function upLine(idx,k,v){
    const ls=[...lines];ls[idx]={...ls[idx],[k]:v};
    onUpdate({...r,[isCC?'transactions':'lines']:ls});
  }
  function rmLine(idx){
    onUpdate({...r,[isCC?'transactions':'lines']:lines.filter((_,i)=>i!==idx)});
  }
  function addLine(){
    const blank=isCC
      ?{date:'',description:'',amount:0,glAcct:'04000',glName:'MISCELLANEOUS',confidence:0.5}
      :{description:'',amount:0,glAcct:'04000',glName:'MISCELLANEOUS',costCentre:'',cgCode:'',stockNum:'',confidence:0.5};
    onUpdate({...r,[isCC?'transactions':'lines']:[...lines,blank]});
  }

  const oc=r.overallConfidence||0;
  const typeLabel=isCC?'CC Statement':r.docType==='payroll_remittance'?'Payroll':r.docType==='other'?'Other':'Invoice';
  const typeCls=isCC?'cc':r.docType==='payroll_remittance'?'payroll':r.docType==='other'?'other':'invoice';

  return(
    <div className="review-card">
      <div className="rc-head">
        <span className={`rc-doctype ${typeCls}`}>{typeLabel}</span>
        <span className="rc-filename">{item.name}</span>
        <span className={`rc-conf ${confCls(oc)}`}>{pct(oc)}</span>
        <button className="btn-rc-remove" onClick={onRemove}>×</button>
      </div>

      <div className="rc-body">
        {/* Header fields */}
        <div className="rc-fields" style={{gridTemplateColumns:isCC?'2fr 1fr 1fr 1fr':'2fr 1fr 1fr 1fr 1fr'}}>
          {/* Vendor */}
          <div className="rc-field">
            <div className="rc-field-label">Vendor</div>
            <select className={`rc-select${(r.vendorConfidence||0)<0.65?' warn':''}`}
              value={r.vendorCode||''}
              onChange={e=>{
                const v=VENDOR_DROPDOWN.find(x=>x.c===e.target.value);
                const pay=['CASE','CASEU','93724'].includes(e.target.value)?'20040':'20000';
                onUpdate({...r,vendorCode:e.target.value,vendorName:v?.n||e.target.value,payableAcct:pay});
              }}>
              {VENDOR_DROPDOWN.map(v=><option key={v.c} value={v.c}>{v.c} — {v.n}</option>)}
              {r.vendorCode&&!VENDOR_DROPDOWN.find(v=>v.c===r.vendorCode)&&
                <option value={r.vendorCode}>{r.vendorCode} — {r.vendorName}</option>}
            </select>
          </div>

          {!isCC&&<>
            <div className="rc-field">
              <div className="rc-field-label">Invoice #</div>
              <input className="rc-input" value={r.invoiceNumber||''}
                onChange={e=>upField('invoiceNumber',e.target.value)}/>
            </div>
            <div className="rc-field">
              <div className="rc-field-label">Invoice Date</div>
              <input className="rc-input" value={r.invoiceDate||''} placeholder="YYYYMMDD"
                onChange={e=>upField('invoiceDate',e.target.value)}/>
            </div>
            <div className="rc-field">
              <div className="rc-field-label">Due Date</div>
              <input className="rc-input" value={r.dueDate||''} placeholder="YYYYMMDD"
                onChange={e=>upField('dueDate',e.target.value)}/>
            </div>
            <div className="rc-field">
              <div className="rc-field-label">Payable Acct</div>
              <select className="rc-select" value={r.payableAcct||'20000'}
                onChange={e=>upField('payableAcct',e.target.value)}>
                <option value="20000">20000 — Accounts Payable</option>
                <option value="20040">20040 — Case Corp (floor plan)</option>
              </select>
            </div>
          </>}

          {isCC&&<>
            <div className="rc-field">
              <div className="rc-field-label">Statement Date</div>
              <input className="rc-input" value={r.statementDate||''} placeholder="YYYYMMDD"
                onChange={e=>upField('statementDate',e.target.value)}/>
            </div>
            <div className="rc-field">
              <div className="rc-field-label">Period Start</div>
              <input className="rc-input" value={r.periodStart||''} placeholder="YYYYMMDD"
                onChange={e=>upField('periodStart',e.target.value)}/>
            </div>
            <div className="rc-field">
              <div className="rc-field-label">Period End</div>
              <input className="rc-input" value={r.periodEnd||''} placeholder="YYYYMMDD"
                onChange={e=>upField('periodEnd',e.target.value)}/>
            </div>
          </>}
        </div>

        {/* GL Lines */}
        <div className="rc-section-title">
          GL Lines
          {mismatch&&<span className="balance-warn">⚠ Lines sum ${sum.toFixed(2)} ≠ total ${(total||0).toFixed(2)} — fix before export</span>}
        </div>
        <table className="gl-table">
          <thead>
            <tr>
              {isCC&&<th style={{width:86}}>Date</th>}
              <th>Description</th>
              <th style={{width:180}}>GL Account</th>
              <th className="r" style={{width:76}}>Amount</th>
              {!isCC&&<th style={{width:34}} title="Cost Centre">CC</th>}
              <th style={{width:38,textAlign:'center'}}>Conf</th>
              <th style={{width:22}}></th>
            </tr>
          </thead>
          <tbody>
            {lines.map((line,idx)=>(
              <tr key={idx}>
                {isCC&&<td>
                  <input className="td-input" style={{width:80}} value={line.date||''} placeholder="YYYYMMDD"
                    onChange={e=>upLine(idx,'date',e.target.value)}/>
                </td>}
                <td><input className="td-input" value={line.description||''}
                  onChange={e=>upLine(idx,'description',e.target.value)}/></td>
                <td>
                  <select className="td-select" value={line.glAcct||''}
                    onChange={e=>{
                      const gl=GL_ACCOUNTS.find(g=>g.c===e.target.value);
                      upLine(idx,'glAcct',e.target.value);
                      if(gl)upLine(idx,'glName',gl.n);
                    }}>
                    {GL_ACCOUNTS.map(g=><option key={g.c} value={g.c}>{g.c} {g.n}</option>)}
                    {line.glAcct&&!GL_ACCOUNTS.find(g=>g.c===line.glAcct)&&
                      <option value={line.glAcct}>{line.glAcct} {line.glName}</option>}
                  </select>
                </td>
                <td className="td-r">
                  <input className="td-input" style={{textAlign:'right',width:70}}
                    value={line.amount??''}
                    onChange={e=>upLine(idx,'amount',parseFloat(e.target.value)||0)}/>
                </td>
                {!isCC&&<td>
                  <input className="td-input" style={{width:30}} value={line.costCentre||''} placeholder="—"
                    onChange={e=>upLine(idx,'costCentre',e.target.value)}/>
                </td>}
                <td style={{textAlign:'center'}}>
                  <span className={`conf-dot ${confCls(line.confidence||0)}`} title={pct(line.confidence||0)}/>
                </td>
                <td>
                  <button className="btn-del-line" onClick={()=>rmLine(idx)}>×</button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
        <button className="btn-add-line" onClick={addLine}>+ Add Line</button>

        {r.warnings&&r.warnings.length>0&&(
          <div className="rc-warnings">
            {r.warnings.map((w,i)=><div key={i} className="rc-warn-item">{w}</div>)}
          </div>
        )}
        {r.notes&&r.notes.trim()&&(
          <div className="rc-notes">
            <div className="rc-note-item">{r.notes}</div>
          </div>
        )}
      </div>

      <div className="rc-footer">
        <span className="rc-footer-label">{isCC?'Balance Due':'Invoice Total'}</span>
        {mismatch&&<span className="rc-mismatch-warn">Blocked — GL lines don't balance</span>}
        <span className="rc-total">${(total||0).toFixed(2)}</span>
      </div>
    </div>
  );
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function Toast({toast}){
  if(!toast)return null;
  return<div className={`toast ${toast.type}`}>{toast.msg}</div>;
}

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const[config,setConfig]=useState(loadConfig);
  const[account,setAccount]=useState(null);
  const[token,setToken]=useState(null);
  const[folders,setFolders]=useState([]);
  const[folderId,setFolderId]=useState('inbox');
  const[emails,setEmails]=useState([]);
  const[scanning,setScanning]=useState(false);
  const[queue,setQueue]=useState([]);
  const[results,setResults]=useState({});
  const[tab,setTab]=useState('outlook');
  const[processing,setProcessing]=useState(false);
  const[toast,setToast]=useState(null);
  const dropRef=useRef(null);
  const fileRef=useRef(null);

  const needsSetup=!config.clientId||!config.tenantId||!config.apiKey;

  function showToast(msg,type='info',ms=3500){
    setToast({msg,type});
    setTimeout(()=>setToast(null),ms);
  }

  useEffect(()=>{
    if(!token)return;
    getMailFolders(token).then(f=>setFolders(f)).catch(()=>{});
  },[token]);

  async function handleSignIn(){
    try{
      const acc=await signIn(config);
      setAccount(acc);
      const tok=await getToken(config,acc);
      setToken(tok);
      showToast(`Signed in as ${acc.username}`,'success');
    }catch(e){showToast(`Sign-in failed: ${e.message}`,'error',6000);}
  }
  async function handleSignOut(){
    try{await signOut(config);}catch{}
    setAccount(null);setToken(null);setEmails([]);
    // _msalReady reset inside signOut — allows fresh init if user signs back in
  }

    const AP_MAILBOX='AccountsPayable@hergottcaseih.com';
  async function handleScan(){
    if(!token){showToast('Sign in first','error');return;}
    setScanning(true);setEmails([]);
    try{
      const tok=await getToken(config,account);setToken(tok);
      const[myMsgs,apMsgs]=await Promise.all([
        getUnreadEmails(tok,folderId),
        getSharedMailboxEmails(tok,AP_MAILBOX),
      ]);
      const allMsgs=[...myMsgs,...apMsgs];
      const enriched=await Promise.all(allMsgs.map(async m=>{
        try{const a=await getAttachments(tok,m.id,m._mailbox);return{...m,pdfs:a};}
        catch{return{...m,pdfs:[]};}
      }));
      const withPdfs=enriched.filter(m=>m.pdfs.length>0);
      setEmails(withPdfs);
      showToast(`${withPdfs.length} email${withPdfs.length!==1?'s':''} with PDFs found`,'success');
    }catch(e){showToast(`Scan failed: ${e.message}`,'error',6000);}
    setScanning(false);
  }

  async function addEmailToQueue(msg){
    if(!token)return;
    for(const att of msg.pdfs){
      const id=`${msg.id}_${att.id}`;
      if(queue.find(q=>q.id===id))continue;
      try{
        const tok=await getToken(config,account);setToken(tok);
        const b64=await getAttachmentB64(tok,msg.id,att.id,msg._mailbox);
        setQueue(q=>[...q,{id,name:att.name,b64,source:msg.subject||msg.from?.emailAddress?.address||'Outlook',status:'pending'}]);
      }catch(e){showToast(`Could not load ${att.name}: ${e.message}`,'error',5000);}
    }
  }

  function addFiles(files){
    Array.from(files)
      .filter(f=>f.type==='application/pdf'||f.name.toLowerCase().endsWith('.pdf'))
      .forEach(file=>{
        const id=`drop_${Date.now()}_${Math.random().toString(36).slice(2,8)}`;
        const reader=new FileReader();
        reader.onload=e=>{
          const b64=e.target.result.split(',')[1];
          setQueue(q=>[...q,{id,name:file.name,b64,source:'Drag & Drop',status:'pending'}]);
        };
        reader.readAsDataURL(file);
      });
  }

  async function extractItem(item){
    setQueue(q=>q.map(x=>x.id===item.id?{...x,status:'processing'}:x));
    try{
      const r=await extractDoc(item.b64,item.name,config.apiKey);
      setResults(prev=>({...prev,[item.id]:r}));
      setQueue(q=>q.map(x=>x.id===item.id?{...x,status:'done'}:x));
    }catch(e){
      setQueue(q=>q.map(x=>x.id===item.id?{...x,status:'error',error:e.message}:x));
      showToast(`Failed: ${item.name} — ${e.message}`,'error',6000);
    }
  }

  async function extractAll(){
    const pending=queue.filter(x=>x.status==='pending');
    if(!pending.length)return;
    setProcessing(true);
    for(const item of pending)await extractItem(item);
    setProcessing(false);
    showToast(`Processed ${pending.length} document${pending.length!==1?'s':''}`,'success');
  }

  function removeItem(id){
    setQueue(q=>q.filter(x=>x.id!==id));
    setResults(r=>{const n={...r};delete n[id];return n;});
  }
  function updateResult(id,r){setResults(prev=>({...prev,[id]:r}));}

  // Drag and drop
  function onDragOver(e){e.preventDefault();dropRef.current?.classList.add('active');}
  function onDragLeave(){dropRef.current?.classList.remove('active');}
  function onDrop(e){e.preventDefault();dropRef.current?.classList.remove('active');addFiles(e.dataTransfer.files);}

  // Export
  const reviewed=queue.filter(x=>x.status==='done'&&results[x.id]);
  const exportable=reviewed.filter(item=>{
    const r=results[item.id];
    const isCC=r.docType==='cc_statement';
    const lines=isCC?(r.transactions||[]):(r.lines||[]);
    const total=isCC?r.balanceDue:r.invoiceTotal;
    const sum=lines.reduce((s,l)=>s+(parseFloat(l.amount)||0),0);
    return Math.abs(sum-total)<=0.05&&(r.overallConfidence||0)>=0.5;
  });
  const blocked=reviewed.length-exportable.length;

  function handleExport(){
    if(!exportable.length)return;
    const csv=buildCSV(exportable.map(item=>results[item.id]));
    const ts=new Date().toISOString().slice(0,10).replace(/-/g,'');
    downloadCSV(csv,`Hergott_AP_${ts}.csv`);
    showToast(`Exported ${exportable.length} document${exportable.length!==1?'s':''} to IntelliDealer CSV`,'success');
  }

  const pendingCount=queue.filter(x=>x.status==='pending').length;

  if(needsSetup)return<SetupScreen onSave={cfg=>{setConfig(cfg);}}/>;

  return(
    <div className="app">
      <div className="app-header">
        <div className="app-logo">Hergott <span>Farm Equipment</span></div>
        <div className="header-divider"/>
        <div className="header-sub">AP Invoice Processor</div>
        <div className="header-spacer"/>
        {account?(
          <div className="header-user">
            <span>{account.username}</span>
            <button className="btn-sign-out" onClick={handleSignOut}>Sign Out</button>
          </div>
        ):(
          <button className="btn-sign-in" onClick={handleSignIn}>Sign In with Microsoft</button>
        )}
        <button className="btn-gear" title="Reset configuration"
          onClick={()=>{if(confirm('Reset all saved configuration?')){localStorage.removeItem('hfe_clientId');localStorage.removeItem('hfe_tenantId');localStorage.removeItem('hfe_apiKey');resetMsal();window.location.reload();}}}>⚙</button>
      </div>

      <div className="app-body">
        {/* ── Left Panel ── */}
        <div className="left-panel">
          <div className="tabs">
            <button className={`tab${tab==='outlook'?' active':''}`} onClick={()=>setTab('outlook')}>Outlook Inbox</button>
            <button className={`tab${tab==='drop'?' active':''}`} onClick={()=>setTab('drop')}>Drag &amp; Drop</button>
          </div>

          {tab==='outlook'&&(
            <div className="panel-section">
              {!account?(
                <div className="no-emails">Sign in to scan your Outlook inbox</div>
              ):(
                <>
                  <div className="folder-row">
                    <select className="folder-select" value={folderId} onChange={e=>setFolderId(e.target.value)}>
                      <option value="inbox">Inbox</option>
                      {folders.map(f=><option key={f.id} value={f.id}>{f.displayName}</option>)}
                    </select>
                    <button className="btn-scan" onClick={handleScan} disabled={scanning}>
                      {scanning?<><span className="spin"/>Scanning</>:'Scan Now'}
                    </button>
                  </div>
                  {emails.length===0&&!scanning&&(
                    <div className="no-emails">No unread emails with PDF attachments</div>
                  )}
                  {emails.length>0&&(
                    <div className="email-list">
                      {emails.map(msg=>(
                        <div key={msg.id} className="email-item">
                          <div className="email-info">
                            <div className="email-subject">{msg.subject||'(no subject)'}</div>
                            <div className="email-meta">{msg.from?.emailAddress?.name||msg.from?.emailAddress?.address} · {new Date(msg.receivedDateTime).toLocaleDateString('en-CA')}</div>
                          </div>
                          {msg._mailbox&&<span className="email-badge" style={{background:'#1a6b3c',marginRight:'4px'}}>AP</span>}<span className="email-badge">{msg.pdfs.length} PDF{msg.pdfs.length!==1?'s':''}</span>
                          <button className="btn-email-add" onClick={()=>addEmailToQueue(msg)}>Add</button>
                        </div>
                      ))}
                    </div>
                  )}
                </>
              )}
            </div>
          )}

          {tab==='drop'&&(
            <div className="panel-section">
              <div className="drop-zone" ref={dropRef}
                onDragOver={onDragOver} onDragLeave={onDragLeave} onDrop={onDrop}
                onClick={()=>fileRef.current?.click()}>
                <div className="drop-zone-icon">📄</div>
                <div className="drop-zone-text">Drop invoice PDFs here</div>
                <div className="drop-zone-hint">Or click to browse files</div>
                <input ref={fileRef} type="file" accept=".pdf,application/pdf" multiple hidden
                  onChange={e=>{addFiles(e.target.files);e.target.value='';}}/>
              </div>
            </div>
          )}

          {/* Queue */}
          <div className="queue-wrap">
            <div className="queue-header">
              <span className="queue-label">Queue ({queue.length})</span>
              {pendingCount>0&&(
                <button className="btn-extract-all" onClick={extractAll} disabled={processing}>
                  {processing?<><span className="spin"/>Processing…</>:`Extract ${pendingCount}`}
                </button>
              )}
            </div>
            <div className="queue-list">
              {queue.length===0&&<div className="queue-empty">Add documents from Outlook or drag-and-drop</div>}
              {queue.map(item=>(
                <div key={item.id} className={`queue-item ${item.status}`}>
                  <span className="qi-icon">
                    {item.status==='pending'?'📄':item.status==='processing'?'⏳':item.status==='done'?'✅':'❌'}
                  </span>
                  <div className="qi-info">
                    <div className="qi-name">{item.name}</div>
                    <div className="qi-source">{item.source}</div>
                  </div>
                  <span className={`qi-status ${item.status}`}>
                    {item.status==='error'?'Error':item.status==='processing'?'…':item.status}
                  </span>
                  {item.status==='pending'&&(
                    <button className="btn-qi-extract" onClick={()=>extractItem(item)}>Extract</button>
                  )}
                  <button className="btn-qi-remove" onClick={()=>removeItem(item.id)}>×</button>
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* ── Right Panel ── */}
        <div className="right-panel">
          {reviewed.length===0&&(
            <div className="empty-state">
              <div className="empty-icon">📋</div>
              <div className="empty-text">No documents extracted yet</div>
              <div className="empty-hint">Add PDFs from Outlook or drag-and-drop, then click Extract</div>
            </div>
          )}

          {reviewed.map(item=>(
            <ReviewCard key={item.id} item={item} result={results[item.id]}
              onUpdate={r=>updateResult(item.id,r)}
              onRemove={()=>removeItem(item.id)}/>
          ))}

          {reviewed.length>0&&(
            <div className="export-bar">
              <div className="export-info">
                <strong>{exportable.length}</strong> ready to export
                {blocked>0&&<span className="blocked"> · {blocked} blocked (fix GL balance)</span>}
                {blocked===0&&<span className="clear"> · All documents balanced</span>}
              </div>
              <button className="btn-export" disabled={exportable.length===0} onClick={handleExport}>
                Export to IntelliDealer
              </button>
            </div>
          )}
        </div>
      </div>

      <Toast toast={toast}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
