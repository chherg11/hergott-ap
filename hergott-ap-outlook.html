.queue-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}

.rc-note-item{font-size:11px;color:#1B5E35;padding:2px 0}
.rc-note-item::before{content:"ℹ "}

.rc-footer{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#F5F3EF;border-top:1px solid #E6E3DE}
.rc-footer-label{font-size:12px;color:#777}
.rc-total{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;color:#C41230}
.rc-mismatch-warn{font-size:11px;color:#C0392B;font-weight:700}

/* Export Bar */
.export-bar{background:#fff;border-radius:6px;border:1px solid #D4D1CB;padding:13px 16px;display:flex;align-items:center;gap:16px;flex-shrink:0}
.export-info{flex:1;font-size:12px;color:#666}
.export-info strong{color:#1A1A18}

.btn-export:disabled{background:#B5B5B5;cursor:not-allowed}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.toast.success{background:#C41230;color:#fff}

.spin{display:inline-block;width:11px;height:11px;border:2px solid rgba(255,255,255,0.35);border-top-color:#fff;border-radius:50%;animation:spin 0.65s linear infinite;vertical-align:middle}
</style>

let _msalReady=null;

function getMsalReady(){
  if(!_msalReady){
    const inst=new msal.PublicClientApplication({

        clientId:CLIENT_ID,
        authority:`https://login.microsoftonline.com/${TENANT_ID}`,
        redirectUri:`${window.location.origin}${window.location.pathname.replace(/\/[^\/]*$/, '/redirect.html')}`,

      cache:{cacheLocation:'sessionStorage',storeAuthStateInCookie:false},

  }
  return _msalReady;
}

function resetMsal(){ _msalReady=null; }

const SCOPES=['User.Read','Mail.Read','Sites.ReadWrite.All'];

async function signIn(){
  const inst=await getMsalReady();

  return r.account;
}

async function signOut(){
  try{
    const inst=await getMsalReady();
    await inst.logoutPopup();
  }catch{}
  resetMsal();
}

async function getToken(account){
  const inst=await getMsalReady();
  try{
    const r=await inst.acquireTokenSilent({scopes:SCOPES,account});
    return r.accessToken;
  }catch(e){
    const isInteractionRequired=
      e instanceof msal.InteractionRequiredAuthError||
      e?.errorCode==='interaction_required'||
      e?.errorCode==='login_required'||
      e?.errorCode==='consent_required';
    if(isInteractionRequired){
      const r=await inst.acquireTokenPopup({scopes:SCOPES,account});
      return r.accessToken;
    }
    throw e;
  }
}

async function gGet(path,tok){
  const r=await fetch(`${GRAPH}${path}`,{headers:{Authorization:`Bearer ${tok}`,Accept:'application/json'}});
  if(!r.ok)throw new Error(`Graph ${r.status}: ${(await r.text()).slice(0,200)}`);
  return r.json();
}
async function gBinary(path,tok){
  const r=await fetch(`${GRAPH}${path}`,{headers:{Authorization:`Bearer ${tok}`}});
  if(!r.ok)throw new Error(`Graph binary ${r.status}`);
  const ab=await r.arrayBuffer();
  let b='';const u=new Uint8Array(ab);
  for(let i=0;i<u.length;i+=8192)b+=String.fromCharCode(...u.slice(i,i+8192));
  return btoa(b);
}

async function getSharedMailboxEmails(tok,upn){
  const url=`/users/${encodeURIComponent(upn)}/mailFolders/inbox/messages?$select=id,subject,from,receivedDateTime,hasAttachments&$top=50`;
  try{
    const d=await gGet(url,tok);
    return(d.value||[]).map(m=>({...m,_mailbox:upn}));

    console.warn(`Shared mailbox fetch failed for ${upn}:`,e.message);

  }
}
async function getAttachments(tok,msgId,upn){

PO Number: Look ONLY for a field explicitly labelled "Customer PO #", "Customer PO", "PO #", "Purchase Order #", or "P.O." — this is Hergott's internal reference, may contain names or codes (e.g. "JeanTremel/JP", "313BTT"). Extract exactly as printed. Do NOT use "Order #", "Original Order #", "Shipment #", "Reference #", or any vendor-assigned numbers. Leave blank if not found.
payableAcct: "20040" ONLY for CASE, CASEU, or 93724 — "20000" for all others.
Currency: check if invoice is in USD. If USD → set currency="USD", add warning "USD INVOICE — convert to CAD before posting"
poNumber: always leave blank "".

PAYMENT TERMS — calculate dueDate:
- FIRST: if the invoice explicitly prints a due date, use it exactly — do not override with terms calculation
- "Net 30" or no terms stated → dueDate = invoiceDate + 30 days
- "Due Upon Receipt" / "Due on Receipt" / "Due Immediately" → dueDate = invoiceDate
- "30th of the following month" → dueDate = the 30th day of the month following the invoice month (e.g. invoice Apr 7 → May 30 = 20260530; invoice Dec 7 → Jan 30)
- "BN30" or "BN30 Net 30" → dueDate = last day of invoice month + 30 days (e.g. invoice Apr 7 → Apr 30 + 30 = May 30 = 20260530)
- "2/10 Net 30" → use Net 30 date
- All dates in YYYYMMDD format

STEP 4 — GL CODING (apply precisely):
${GL_RULES}

DEPARTMENTAL ACCOUNTS — these specific accounts are split across multiple profit centres. When coding to one of these, add a warning "Departmental account — append profit centre if required: 0=Admin 1=Sales 3=Parts 4=Service 6=Trucking":
00460 MEALS & ENTERTAINMENT, 00500 TRAINING, 00600 PROMOTION, 00601 ADVERTISING, 00602 SPONSORSHIPS, 00700 DEMONSTRATIONS, 00800 AFTER SALES EXPENSE, 01402 BOOT & SAFETY GEAR, 01500 TRUCK EXPENSE, 02000 OFFICE SUPPLIES, 02370 VACATION & HOLIDAY PAY, 04500 COMPUTER SERVICES, 04600 MEALS & ENTERTAINMENT
DO NOT add departmental warning for: 01100 PARTS FREIGHT (always dept 3), 01101 ENVIRONMENTAL CHARGE (always dept 3), 01400 SHOP SUPP (always dept 4), 01510-01560 DELIVERY TRUCK (always dept 6), 00900 FLOOR PLAN INTEREST (always dept 1)

VENDOR-SPECIFIC RULES:
- VitalEdge / VitalECM / VRC / Vital Records Control / vrcnetwork.com → vendorCode="97387" (ALWAYS — this is a known vendor, do NOT use MISC)
- Westward Parts → always 14001, never 14000
- Golden West Broadcasting / BOLT 107.5 / DiscoverHumboldt → GL 00601 ADVERTISING + departmental warning
- Rawlco Radio → GL 00601 ADVERTISING + departmental warning
- Colony Chevrolet GMC / Colony Chev → vendorCode="91033", GL 01500 TRUCK EXPENSE. Colony invoices Hergott for vehicle service work — this IS a valid AP invoice payable by Hergott, classify as supplier_invoice. Do NOT classify as "other". Warranty claim codes or reference numbers on Colony invoices are Colony's internal claim tracking — they do NOT affect Hergott's payment obligation. Do NOT add any warning about warranty coverage or payment responsibility.
- Canadian Energy / CDN Energy → vendorCode="MISC"
- Ag Express Electronics → vendorCode="MISC"; if USD set currency="USD"

Rules for every invoice:
- Extract GST (5%) as a SEPARATE GL line to 21450 if shown.
- Extract PST (6% SK) as a SEPARATE GL line to 21400 if shown.
- For CC statements: code EVERY individual transaction.
- Floor plan interest (GL 00900) ALWAYS gets costCentre="1".
- Do not default to 04000 when a more specific code applies.
- For credit_memo: ALL amounts including GL lines must be negative numbers.
- stockNum MUST be blank for ALL supplier invoice lines. Part numbers, item codes, and order numbers are NOT stock numbers. Stock # in IntelliDealer refers only to equipment unit identifiers (e.g. U29583, U76320) used for floor plan curtailments — these never appear on regular supplier invoices. Leave stockNum="" always.
- PO Branch is always blank — leave out of your response or set to "".

STEP 5 — VALIDATE:
Sum all GL line amounts. Must equal invoiceTotal within $0.05. Flag anomalies in warnings.

RETURN ONLY VALID JSON. No markdown, no explanation.

For supplier_invoice, credit_memo, or payroll_remittance:
{"docType":"supplier_invoice","vendorCode":"","vendorName":"","vendorConfidence":0.0,"invoiceNumber":"","poNumber":"","invoiceDate":"YYYYMMDD","dueDate":"YYYYMMDD","payableAcct":"20000","currency":"CAD","invoiceTotal":0.00,"lines":[{"description":"","amount":0.00,"glAcct":"00000","glName":"","costCentre":"","cgCode":"","stockNum":"","confidence":0.0}],"warnings":[],"overallConfidence":0.0,"notes":""}

For statement or other:
{"docType":"other","vendorCode":"","vendorName":"","vendorConfidence":0.0,"invoiceNumber":"","invoiceDate":"YYYYMMDD","invoiceTotal":0.00,"currency":"CAD","lines":[],"warnings":["reason"],"overallConfidence":0.0,"notes":""}

For cc_statement:
{"docType":"cc_statement","vendorCode":"97392","vendorName":"SCOTIABANK - VISA BOX 4100","vendorConfidence":1.0,"statementDate":"YYYYMMDD","periodStart":"YYYYMMDD","periodEnd":"YYYYMMDD","balanceDue":0.00,"minimumPayment":0.00,"currency":"CAD","transactions":[{"date":"YYYYMMDD","description":"","amount":0.00,"glAcct":"00000","glName":"","confidence":0.0}],"warnings":[],"overallConfidence":0.0,"notes":""}`;

  let lastErr;
  for(let i=0;i<4;i++){
    if(i>0){
      const wait=lastErr&&lastErr.message?.includes('429')?62000:lastErr&&lastErr.message?.includes('529')?15000:2000*i;
      await new Promise(r=>setTimeout(r,wait));
    }
    try{
      const res=await fetch(PROXY_URL,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:MODEL,max_tokens:8000,
          messages:[{role:'user',content:[
            {type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}},
            {type:'text',text:prompt}
          ]}]
        })
      });
      if(!res.ok){const t=await res.text();throw new Error(`Anthropic ${res.status}: ${t.slice(0,300)}`);}
      const d=await res.json();
      const raw=(d.content||[]).map(c=>c.text||'').join('').trim();
      const clean=raw.replace(/^```json\s*/,'').replace(/\s*```$/,'').trim();
      const parsed=JSON.parse(clean);
      // Always blank PO number — user confirmed they never want this pulled from invoices
      if(parsed.poNumber!==undefined)parsed.poNumber='';
      return parsed;
    }catch(e){lastErr=e;}
  }
  throw lastErr;
}

function csv(v){
  if(v===undefined||v===null)return'';
  const s=String(v);
  return(s.includes(',')||s.includes('"')||s.includes('\n'))?`"${s.replace(/"/g,'""')}"`:`s`==='s'?s:s;
}
function fv(v){const s=String(v===undefined||v===null?'':v);return(s.includes(',')||s.includes('"'))?`"${s.replace(/"/g,'""')}"`:s;}
function addDays(ds,n){
  if(!ds||ds.length!==8)return'';
  const d=new Date(`${ds.slice(0,4)}-${ds.slice(4,6)}-${ds.slice(6,8)}`);
  d.setDate(d.getDate()+n);
  return d.toISOString().slice(0,10).replace(/-/g,'');
}
function buildCSV(results){
  const H='Record ID,Company,Vendor#,Division,Invoice Total,Discount Amount,Invoice #,Bank Cost Center,Bank Account #,Payable Cost Center,Payable Account #,Discount Cost Center,Discount Account #,PO Number,PO Branch,Purchase Date,Due Date,GL Amount,GL Cost Center,GL Account #,Complete Goods Code,Stock #,Description,A/R customer number';
  const rows=[H];let rid=1;
  for(const r of results){
    const isCC=r.docType==='cc_statement';
    const vendor=r.vendorCode||'MISC';
    const payable=r.payableAcct||'20000';
    const total=isCC?r.balanceDue:r.invoiceTotal;
    const invNum=isCC?r.statementDate:r.invoiceNumber;
    const purDate=isCC?r.statementDate:r.invoiceDate;
    const dueDate=isCC?addDays(r.statementDate,30):r.dueDate;
    const lines=isCC?(r.transactions||[]):(r.lines||[]);
    for(const line of lines){
      const glCC=isCC?'':(line.costCentre||'');
      rows.push([
        rid,'01',fv(vendor),'01',fv(total),'',fv(invNum),'','10200','',
        fv(payable),'','582000',fv(r.poNumber||''),'',fv(purDate),fv(dueDate),
        fv(line.amount),fv(glCC),fv(line.glAcct),
        fv(line.cgCode||''),fv(line.stockNum||''),fv(line.description),''
      ].join(','));
    }
    rid++;
  }
  return rows.join('\r\n');
}
function downloadCSV(content,filename){
  const b=new Blob([content],{type:'text/csv;charset=utf-8;'});
  const u=URL.createObjectURL(b);
  const a=document.createElement('a');
  a.href=u;a.download=filename;a.click();
  URL.revokeObjectURL(u);
}

const MONTH_NAMES=['January','February','March','April','May','June','July','August','September','October','November','December'];

function getUploadPath(result, filename){
  const docType=result.docType;
  const vendorName=(result.vendorName||'Unknown Vendor').replace(/[\/\\:*?"<>|]/g,'_').trim();
  const dateStr=result.invoiceDate||result.statementDate||new Date().toISOString().slice(0,10).replace(/-/g,'');
  const year=dateStr.slice(0,4)||new Date().getFullYear().toString();
  const monthNum=parseInt(dateStr.slice(4,6),10)||new Date().getMonth()+1;
  const monthFolder=String(monthNum).padStart(2,'0')+' - '+(MONTH_NAMES[monthNum-1]||'Unknown');
  let topFolder;
  if(docType==='cc_statement'){topFolder='CC Statements';}
  else if(docType==='statement'){topFolder='Statements';}
  else if(docType==='other'){topFolder='Other';}
  else{topFolder='Invoices';}  // supplier_invoice, credit_memo, payroll_remittance all go in Invoices
  const vendorFolder=docType==='cc_statement'?'Scotiabank Visa':vendorName;
  return `AP Documents/${topFolder}/${vendorFolder}/${year}/${monthFolder}/${filename}`;
}

function buildUploadFilename(result, originalName){
  const dateStr=result.invoiceDate||result.statementDate||new Date().toISOString().slice(0,10).replace(/-/g,'');
  const vendorCode=(result.vendorCode||'MISC').replace(/[^a-zA-Z0-9]/g,'');
  const vendorShort=(result.vendorName||'Unknown').replace(/[^a-zA-Z0-9]/g,'').slice(0,20);
  const invNum=(result.invoiceNumber||result.statementDate||'').replace(/[^a-zA-Z0-9-]/g,'').slice(0,20);
  const ext=(originalName||'').split('.').pop().toLowerCase()||'pdf';
  return `${dateStr}_${vendorCode}_${vendorShort}${invNum?'_'+invNum:''}.${ext}`;
}

async function uploadPdfToSharePoint(tok, b64, result, originalName){
  const filename=buildUploadFilename(result, originalName);
  const filePath=getUploadPath(result, filename);
  // Build URL — encode each path segment separately, keep slashes
  const segments=filePath.split('/').map(s=>encodeURIComponent(s)).join('/');
  const url=`https://graph.microsoft.com/v1.0/sites/${SP_SITE}/drive/root:/${segments}:/content`;
  const binary=atob(b64);
  const bytes=new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++)bytes[i]=binary.charCodeAt(i);
  const w=await fetch(url,{method:'PUT',headers:{Authorization:`Bearer ${tok}`,'Content-Type':'application/pdf'},body:bytes.buffer});
  if(!w.ok){const t=await w.text();throw new Error(`PDF upload failed ${w.status}: ${t.slice(0,200)}`);}
  return filePath;
}

function USDConversionBanner({r,onUpdate}){
  const [rate,setRate]=React.useState(r._usdRate||'');
  const [fee,setFee]=React.useState(r._usdFee||'0');
  const [feeType,setFeeType]=React.useState(r._usdFeeType||'$'); // '$' or '%'
  const [fetching,setFetching]=React.useState(false);
  const [fetchErr,setFetchErr]=React.useState('');

  const usdTotal=r._usdOriginal||r.invoiceTotal||0;
  const feeAmount=feeType==='%'
    ?parseFloat(usdTotal)*parseFloat(rate||0)*(parseFloat(fee||0)/100)
    :parseFloat(fee||0);
  const cadTotal=rate?(parseFloat(usdTotal)*parseFloat(rate)+feeAmount).toFixed(2):'';

  async function fetchRate(){
    setFetching(true);setFetchErr('');
    try{
      const today=new Date().toISOString().slice(0,10);
      const res=await fetch(`https://www.bankofcanada.ca/valet/observations/FXUSDCAD/json?start_date=${today}&end_date=${today}`);
      const d=await res.json();
      const obs=d.observations;
      if(obs&&obs.length>0){
        const r2=parseFloat(obs[obs.length-1].FXUSDCAD.v);
        setRate(r2.toFixed(4));
      } else {
        // Try yesterday if today not available yet
        const yest=new Date(Date.now()-86400000).toISOString().slice(0,10);
        const res2=await fetch(`https://www.bankofcanada.ca/valet/observations/FXUSDCAD/json?start_date=${yest}&end_date=${yest}`);
        const d2=await res2.json();
        const obs2=d2.observations;
        if(obs2&&obs2.length>0)setRate(parseFloat(obs2[obs2.length-1].FXUSDCAD.v).toFixed(4));
        else setFetchErr('Rate not available — enter manually');
      }
    }catch(e){setFetchErr('Could not fetch rate — enter manually');}
    setFetching(false);
  }

  function applyConversion(){
    if(!rate||!cadTotal)return;
    const newLines=(r.lines||[]).map(l=>{
      if(l.glAcct==='21450'||l.glAcct==='21400')return l; // keep tax lines as-is (USD invoice has no CA tax)
      const ratio=parseFloat(l.amount)/(usdTotal);
      return {...l,amount:parseFloat((ratio*(parseFloat(cadTotal))).toFixed(2))};
    });
    onUpdate({...r,invoiceTotal:parseFloat(cadTotal),lines:newLines,currency:'CAD',_usdRate:rate,_usdFee:fee,_usdFeeType:feeType,_usdOriginal:usdTotal,
      warnings:(r.warnings||[]).filter(w=>!w.includes('USD INVOICE')).concat([`Converted from USD $${usdTotal} @ ${rate} + ${feeType==='%'?fee+'%':'$'+fee} fee = CAD $${cadTotal}`])});
  }

  return(
    <div className="usd-banner">
      <strong>⚠ USD Invoice — Convert to CAD before export</strong>
      <div style={{fontSize:11,marginBottom:6}}>USD Amount: <strong>${usdTotal}</strong></div>
      <div className="usd-row">
        <span className="usd-label">Exchange rate (USD→CAD):</span>
        <input className="usd-input" value={rate} onChange={e=>setRate(e.target.value)} placeholder="e.g. 1.3850"/>
        <button className="usd-btn" onClick={fetchRate} disabled={fetching}>{fetching?'Fetching…':'Get Rate'}</button>
      </div>
      <div className="usd-row">
        <span className="usd-label">Bank exchange fee:</span>
        <input className="usd-input" value={fee} onChange={e=>setFee(e.target.value)} placeholder="0"/>
        <button className="usd-btn" style={{background:feeType==='$'?'#C41230':'#888',padding:'4px 8px'}} onClick={()=>setFeeType('$')}>$</button>
        <button className="usd-btn" style={{background:feeType==='%'?'#C41230':'#888',padding:'4px 8px'}} onClick={()=>setFeeType('%')}>%</button>
      </div>
      {fetchErr&&<div style={{fontSize:11,color:'#B00',marginTop:4}}>{fetchErr}</div>}
      {cadTotal&&<div className="usd-converted">→ CAD Total: ${cadTotal}</div>}
      {cadTotal&&<div className="usd-row" style={{marginTop:8}}>
        <button className="usd-btn" onClick={applyConversion}>Apply Conversion & Unlock Export</button>
      </div>}
    </div>
  );
}

// ── Review Card ───────────────────────────────────────────────────────────────
function ReviewCard({item,result,onUpdate,onRemove,onAddCSV,onReextract,onUploadPdf,extraVendors=[]}){
  const allVendors=[...VENDOR_DROPDOWN,...extraVendors.map(v=>({c:v.code,n:v.name}))];
  const r=result;
  const isCC=r.docType==='cc_statement';
  const lines=isCC?(r.transactions||[]):(r.lines||[]);
  const total=isCC?r.balanceDue:r.invoiceTotal;
  const sum=lines.reduce((s,l)=>s+(parseFloat(l.amount)||0),0);
  const mismatch=Math.abs(sum-total)>0.05;

  function upField(k,v){onUpdate({...r,[k]:v});}
  function upLine(idx,k,v){
    const ls=[...lines];ls[idx]={...ls[idx],[k]:v};
    onUpdate({...r,[isCC?'transactions':'lines']:ls});
  }
  function rmLine(idx){
    onUpdate({...r,[isCC?'transactions':'lines']:lines.filter((_,i)=>i!==idx)});
  }
  function addLine(){
    const blank=isCC
      ?{date:'',description:'',amount:0,glAcct:'04000',glName:'MISCELLANEOUS',confidence:0.5}
      :{description:'',amount:0,glAcct:'04000',glName:'MISCELLANEOUS',costCentre:'',cgCode:'',stockNum:'',confidence:0.5};
    onUpdate({...r,[isCC?'transactions':'lines']:[...lines,blank]});
  }

  const oc=r.overallConfidence||0;
  const isUSD=r.currency==='USD';
  const isCreditMemo=r.docType==='credit_memo';
  const isSkip=r.docType==='other'||r.docType==='statement';
  const typeLabel=isCC?'CC Statement':isCreditMemo?'Credit Memo':r.docType==='payroll_remittance'?'Payroll':r.docType==='statement'?'Statement':r.docType==='other'?'Skip':'Invoice';
  const typeCls=isCC?'cc':isCreditMemo?'credit':r.docType==='payroll_remittance'?'payroll':r.docType==='statement'?'statement':r.docType==='other'?'other':'invoice';

  return(
    <div className="review-card">
      <div className="rc-head">
        <span className={`rc-doctype ${typeCls}`}>{typeLabel}</span>
        <span className="rc-filename">{item.name}</span>
        {item.source&&<span style={{fontSize:'10px',color:'#AAA',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:180,flexShrink:1}} title={item.source}>{item.source}</span>}
        <span className={`rc-conf ${confCls(oc)}`}>{pct(oc)}</span>
        {item.b64&&<button className="btn-rc-remove" style={{marginRight:'4px',background:'#C41230',color:'#fff',fontSize:'10px',padding:'2px 8px',borderRadius:'3px',border:'none',cursor:'pointer'}} onClick={()=>{const u=URL.createObjectURL(new Blob([Uint8Array.from(atob(item.b64),c=>c.charCodeAt(0))],{type:'application/pdf'}));window.open(u,'_blank');}}>PDF</button>}<button className="btn-rc-remove" onClick={onRemove}>×</button>
      </div>

      {/* Collapsed view for skip/statement docs — no form, no export */}
      {isSkip&&(
        <div style={{padding:'10px 14px'}}>
          {r.warnings&&r.warnings.map((w,i)=><div key={i} style={{fontSize:'12px',color:'#7A5A00',background:'#FFFBF0',border:'1px solid #F5E27A',borderRadius:'4px',padding:'7px 10px',marginBottom:6}}>⚠ {w}</div>)}
          {r.notes&&<div style={{fontSize:'11px',color:'#1B5E35',background:'#EAF4F0',border:'1px solid #A8D5BC',borderRadius:'4px',padding:'7px 10px',marginTop:4}}>{r.notes}</div>}
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:10,gap:8}}>
            <span style={{fontSize:'11px',color:'#999'}}>Not exported — remove when done reviewing</span>
            <div style={{display:'flex',gap:6}}>
              {item.b64&&<button
                style={{fontSize:'11px',padding:'3px 10px',background:r._uploadedPdf?'#2D6A4F':'#34495E',color:'#fff',border:'none',borderRadius:'4px',cursor:r._uploadedPdf?'default':'pointer',fontWeight:600,opacity:r._uploadedPdf?0.7:1}}
                onClick={()=>!r._uploadedPdf&&onUploadPdf&&onUploadPdf(item.id,item.name,r)}
                disabled={!!r._uploadedPdf}>
                {r._uploadedPdf?'PDF ✓':'↑ Upload PDF'}
              </button>}
              {item.b64&&<button onClick={()=>onReextract&&onReextract()}
                style={{fontSize:'11px',padding:'3px 10px',background:'#2C3E50',color:'#fff',border:'none',borderRadius:'4px',cursor:'pointer',fontWeight:600}}>
                Re-extract
              </button>}
              <button onClick={()=>onUpdate({...r,docType:'supplier_invoice',warnings:[],notes:'Manually overridden from '+r.docType})}
                style={{fontSize:'11px',padding:'3px 10px',background:'#5C4A1E',color:'#fff',border:'none',borderRadius:'4px',cursor:'pointer',fontWeight:600}}>
                Override — Process as Invoice
              </button>
            </div>
          </div>
        </div>
      )}

      {!isSkip&&(<><div className="rc-body">
        {/* USD conversion banner */}
        {isUSD&&<USDConversionBanner r={r} onUpdate={onUpdate}/>}
        {/* Header fields */}
        <div className="rc-fields" style={{gridTemplateColumns:isCC?'2fr 1fr 1fr 1fr':'2fr 1fr 1fr 1fr 1fr 1fr'}}>
          {/* Vendor */}
          <div className="rc-field">
            <div className="rc-field-label">Vendor</div>
            <select className={`rc-select${(r.vendorConfidence||0)<0.65?' warn':''}`}
              value={r.vendorCode||''}
              onChange={e=>{
                const v=allVendors.find(x=>x.c===e.target.value);
                const pay=['CASE','CASEU','93724'].includes(e.target.value)?'20040':'20000';
                onUpdate({...r,vendorCode:e.target.value,vendorName:v?.n||e.target.value,payableAcct:pay});
              }}>
              {allVendors.map(v=><option key={v.c} value={v.c}>{v.c} — {v.n}</option>)}
              {r.vendorCode&&!allVendors.find(v=>v.c===r.vendorCode)&&
                <option value={r.vendorCode}>{r.vendorCode} — {r.vendorName}</option>}
            </select>
          </div>

          {!isCC&&<>
            <div className="rc-field">
              <div className="rc-field-label">Invoice #</div>
              <input className="rc-input" value={r.invoiceNumber||''}
                onChange={e=>upField('invoiceNumber',e.target.value)}/>
            </div>
            <div className="rc-field">
              <div className="rc-field-label">Invoice Date</div>
              <input className="rc-input" value={r.invoiceDate||''} placeholder="YYYYMMDD"
                onChange={e=>upField('invoiceDate',e.target.value)}/>
            </div>
            <div className="rc-field">
              <div className="rc-field-label">Due Date</div>
              <input className="rc-input" value={r.dueDate||''} placeholder="YYYYMMDD"
                onChange={e=>upField('dueDate',e.target.value)}/>
            </div>
            <div className="rc-field">
              <div className="rc-field-label">PO Number</div>
              <input className="rc-input" value={r.poNumber||''} placeholder="—"
                onChange={e=>upField('poNumber',e.target.value)}/>
            </div>
            <div className="rc-field">
              <div className="rc-field-label">Payable Acct</div>
              <select className="rc-select" value={r.payableAcct||'20000'}
                onChange={e=>upField('payableAcct',e.target.value)}>
                <option value="20000">20000 — Accounts Payable</option>
                <option value="20040">20040 — Case Corp (floor plan)</option>
              </select>
            </div>
          </>}

          {isCC&&<>
            <div className="rc-field">
              <div className="rc-field-label">Statement Date</div>
              <input className="rc-input" value={r.statementDate||''} placeholder="YYYYMMDD"
                onChange={e=>upField('statementDate',e.target.value)}/>
            </div>
            <div className="rc-field">
              <div className="rc-field-label">Period Start</div>
              <input className="rc-input" value={r.periodStart||''} placeholder="YYYYMMDD"
                onChange={e=>upField('periodStart',e.target.value)}/>
            </div>
            <div className="rc-field">
              <div className="rc-field-label">Period End</div>
              <input className="rc-input" value={r.periodEnd||''} placeholder="YYYYMMDD"
                onChange={e=>upField('periodEnd',e.target.value)}/>
            </div>
          </>}
        </div>

        {/* GL Lines */}
        <div className="rc-section-title">
          GL Lines
          {mismatch&&<span className="balance-warn">⚠ Lines sum ${sum.toFixed(2)} ≠ total ${(total||0).toFixed(2)} — fix before export</span>}
        </div>
        <table className="gl-table">
          <thead>
            <tr>
              {isCC&&<th style={{width:86}}>Date</th>}
              <th>Description</th>
              <th style={{width:180}}>GL Account</th>
              {!isCC&&<th style={{width:44}} title="Cost Centre — 0=Admin 1=Sales 3=Parts 4=Service 6=Trucking">CC</th>}
              <th className="r" style={{width:76}}>Amount</th>
              {!isCC&&<th style={{width:36}} title="Complete Goods Code">CGC</th>}
              {!isCC&&<th style={{width:70}} title="Stock # (equipment units only — rare on supplier invoices)">Stock #</th>}
              <th style={{width:38,textAlign:'center'}}>Conf</th>
              <th style={{width:22}}></th>
            </tr>
          </thead>
          <tbody>
            {lines.map((line,idx)=>(
              <tr key={idx}>
                {isCC&&<td>
                  <input className="td-input" style={{width:80}} value={line.date||''} placeholder="YYYYMMDD"
                    onChange={e=>upLine(idx,'date',e.target.value)}/>
                </td>}
                <td><input className="td-input" value={line.description||''}
                  onChange={e=>upLine(idx,'description',e.target.value)}/></td>
                <td>
                  <select className="td-select" value={line.glAcct||''}
                    onChange={e=>{
                      const gl=GL_ACCOUNTS.find(g=>g.c===e.target.value);
                      const ls=[...lines];
                      ls[idx]={...ls[idx],glAcct:e.target.value,...(gl?{glName:gl.n}:{})};
                      onUpdate({...r,[isCC?'transactions':'lines']:ls});
                    }}>
                    {GL_ACCOUNTS.map(g=><option key={g.c} value={g.c}>{g.c} {g.n}</option>)}
                    {line.glAcct&&!GL_ACCOUNTS.find(g=>g.c===line.glAcct)&&
                      <option value={line.glAcct}>{line.glAcct} {line.glName}</option>}
                  </select>
                </td>
                {!isCC&&<td>
                  <select className="td-select" value={line.costCentre||''} onChange={e=>upLine(idx,'costCentre',e.target.value)}>
                    <option value="">—</option>
                    <option value="0">0 Admin</option>
                    <option value="1">1 Sales</option>
                    <option value="3">3 Parts</option>
                    <option value="4">4 Service</option>
                    <option value="6">6 Trucking</option>
                  </select>
                </td>}
                <td className="td-r">
                  <input className="td-input" style={{textAlign:'right',width:70}}
                    value={line._amtStr!==undefined?line._amtStr:(line.amount!=null?(parseFloat(line.amount)||0).toFixed(2):'')}
                    onChange={e=>upLine(idx,'_amtStr',e.target.value)}
                    onBlur={e=>{
                      const v=parseFloat(e.target.value)||0;
                      const ls=[...lines];ls[idx]={...ls[idx],amount:v,_amtStr:undefined};
                      onUpdate({...r,[isCC?'transactions':'lines']:ls});
                    }}
                    placeholder="0.00"/>
                </td>{!isCC&&<td>
                  <input className="td-input" style={{width:34}} value={line.cgCode||''} placeholder="—"
                    onChange={e=>upLine(idx,'cgCode',e.target.value)}/>
                </td>}{!isCC&&<td><input className="td-input" style={{width:70}} value={line.stockNum||''} placeholder="—"
                    onChange={e=>upLine(idx,'stockNum',e.target.value)}/>
                </td>}
                <td style={{textAlign:'center'}}>
                  <span className={`conf-dot ${confCls(line.confidence||0)}`} title={pct(line.confidence||0)}/>
                </td>
                <td>
                  <button className="btn-del-line" onClick={()=>rmLine(idx)}>×</button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
        <button className="btn-add-line" onClick={addLine}>+ Add Line</button>

        {r.warnings&&r.warnings.length>0&&(
          <div className="rc-warnings">
            {r.warnings.map((w,i)=><div key={i} className="rc-warn-item">{w}</div>)}
          </div>
        )}
        {r.notes&&r.notes.trim()&&(
          <div className="rc-notes">
            <div className="rc-note-item">{r.notes}</div>
          </div>
        )}
      </div>

      <div className="rc-footer">
        <span className="rc-footer-label">{isCC?'Balance Due':'Invoice Total'}</span>
        <div style={{display:'flex',gap:6,alignItems:'center'}}>
          {!isSkip&&!mismatch&&!isUSD&&<button
            style={{padding:'4px 12px',background:r._addedToCSV?'#2D6A4F':'#C41230',color:'#fff',border:'none',borderRadius:'4px',fontFamily:"'Barlow Condensed',sans-serif",fontSize:'13px',fontWeight:700,letterSpacing:'0.05em',textTransform:'uppercase',cursor:r._addedToCSV?'default':'pointer',opacity:r._addedToCSV?0.7:1}}
            onClick={()=>!r._addedToCSV&&onAddCSV&&onAddCSV(item.id,r)}
            disabled={!!r._addedToCSV}
            title={r._addedToCSV?"Already added to today's CSV":"Append this document to today's OneDrive CSV"}>
            {r._addedToCSV?'Added ✓':'+ Add to CSV'}
          </button>}
          {item.b64&&<button
            style={{padding:'4px 12px',background:r._uploadedPdf?'#2D6A4F':'#34495E',color:'#fff',border:'none',borderRadius:'4px',fontFamily:"'Barlow Condensed',sans-serif",fontSize:'13px',fontWeight:700,letterSpacing:'0.05em',textTransform:'uppercase',cursor:r._uploadedPdf?'default':'pointer',opacity:r._uploadedPdf?0.7:1}}
            onClick={()=>!r._uploadedPdf&&onUploadPdf&&onUploadPdf(item.id,item.name,r)}
            disabled={!!r._uploadedPdf}
            title={r._uploadedPdf?'Already uploaded to SharePoint':'Upload PDF to SharePoint document library'}>
            {r._uploadedPdf?'PDF ✓':'↑ Upload PDF'}
          </button>}
        </div>
        <span className="rc-total" style={{color:isCreditMemo?'#C0392B':undefined}}>${(total||0).toFixed(2)}</span>
      </div>
    </>)}
    </div>
  );
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function Toast({toast}){
  if(!toast)return null;
  return<div className={`toast ${toast.type}`}>{toast.msg}</div>;
}

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const[account,setAccount]=useState(null);
  const[token,setToken]=useState(null);
  const[folders,setFolders]=useState([]);
  const AP_FOLDER_ID='AAMkADAwY2RiOGIwLTNkNWEtNDNlNC04ZGZjLTQwMGY1MDg1Mjk4NAAuAAAAAAAHDVOfDT4oSIruQk434m3wAQAMceb0LHNsQIeZ8oOH-9q0AAStSKcvAAA=';const[folderId,setFolderId]=useState(AP_FOLDER_ID);
  const[emails,setEmails]=useState([]);
  const[checkedEmails,setCheckedEmails]=useState(new Set());
  const[scanning,setScanning]=useState(false);
  const[queue,setQueue]=useState([]);
  const[results,setResults]=useState({});
  const[tab,setTab]=useState('outlook');
  const[processing,setProcessing]=useState(false);
  const[toast,setToast]=useState(null);
  const[customVendors,setCustomVendors]=useState([]);
  const[showVendorMgr,setShowVendorMgr]=useState(false);
  const[vendorSaving,setVendorSaving]=useState(false);
  const dropRef=useRef(null);
  const fileRef=useRef(null);

  function showToast(msg,type='info',ms=3500){
    setToast({msg,type});
    setTimeout(()=>setToast(null),ms);
  }

  useEffect(()=>{
    if(!token)return;
    getMailFolders(token).then(f=>setFolders(f)).catch(()=>{});
  },[token]);

  async function handleSignIn(){
    try{
      const acc=await signIn();
      setAccount(acc);
      const tok=await getToken(acc);
      setToken(tok);
      showToast(`Signed in as ${acc.username}`,'success');
      // Load shared custom vendor list from SharePoint
      try{const cv=await loadCustomVendors(tok);setCustomVendors(cv);}catch{}
    }catch(e){showToast(`Sign-in failed: ${e.message}`,'error',6000);}
  }
  async function handleSignOut(){
    try{await signOut();}catch{}
    setAccount(null);setToken(null);setEmails([]);
  }

    async function handleScan(){
    if(!token){showToast('Sign in first','error');return;}
    setScanning(true);setEmails([]);setCheckedEmails(new Set());
    try{
      const tok=await getToken(account);setToken(tok);
      const msgs=await getUnreadEmails(tok,folderId);
      // Show all emails with attachments immediately — no per-email API calls
      // PDF attachment details fetched later when user adds to queue
      const withAtts=msgs.filter(m=>m.hasAttachments).map(m=>({...m,pdfs:null}));
      setEmails(withAtts);
      showToast(`${withAtts.length} email${withAtts.length!==1?'s':''} with attachments found`,'success');
    }catch(e){showToast(`Scan failed: ${e.message}`,'error',6000);}
    setScanning(false);
  }

  async function addEmailToQueue(msg){
    if(!token)return;
    try{
      const tok=await getToken(account);setToken(tok);
      // Fetch attachment list now (deferred from scan)
      const pdfs=msg.pdfs||await getAttachments(tok,msg.id,msg._mailbox);
      if(!pdfs.length){showToast('No PDF attachments found in this email','error');return;}
      let loaded=false;
      for(const att of pdfs){
        const id=`${msg.id}_${att.id}`;
        if(queue.find(q=>q.id===id)){loaded=true;continue;}
        try{
          const b64=await getAttachmentB64(tok,msg.id,att.id,msg._mailbox);
          await markAsRead(tok,msg.id,msg._mailbox);
          setQueue(q=>[...q,{id,name:att.name,b64,source:msg.subject||msg.from?.emailAddress?.address||'Outlook',status:'pending'}]);
          loaded=true;
        }catch(e){showToast(`Could not load ${att.name}: ${e.message}`,'error',5000);}
      }
      return loaded;
    }catch(e){showToast(`Could not load attachments: ${e.message}`,'error',5000);return false;}
  }

  async function addCheckedToQueue(){
    const toAdd=emails.filter(m=>checkedEmails.has(m.id));
    if(!toAdd.length)return;
    const succeeded=new Set();
    for(const msg of toAdd){
      const ok=await addEmailToQueue(msg);
      if(ok)succeeded.add(msg.id);
    }
    setEmails(prev=>prev.filter(m=>!succeeded.has(m.id)));
    setCheckedEmails(new Set());
  }

  function toggleCheck(id){
    setCheckedEmails(prev=>{const s=new Set(prev);s.has(id)?s.delete(id):s.add(id);return s;});
  }
  function toggleCheckAll(){
    setCheckedEmails(prev=>prev.size===emails.length?new Set():new Set(emails.map(m=>m.id)));
  }

  function addFiles(files){
    Array.from(files)
      .filter(f=>f.type==='application/pdf'||f.name.toLowerCase().endsWith('.pdf'))
      .forEach(file=>{
        const id=`drop_${Date.now()}_${Math.random().toString(36).slice(2,8)}`;
        const reader=new FileReader();
        reader.onload=e=>{
          const b64=e.target.result.split(',')[1];
          setQueue(q=>[...q,{id,name:file.name,b64,source:'Drag & Drop',status:'pending'}]);
        };
        reader.readAsDataURL(file);
      });
  }

  async function extractItem(item){
    setQueue(q=>q.map(x=>x.id===item.id?{...x,status:'processing'}:x));
    try{
      const r=await extractDoc(item.b64,item.name,customVendors);
      setResults(prev=>({...prev,[item.id]:r}));
      setQueue(q=>q.map(x=>x.id===item.id?{...x,status:'done'}:x));
    }catch(e){
      setQueue(q=>q.map(x=>x.id===item.id?{...x,status:'error',error:e.message}:x));
      showToast(`Failed: ${item.name} — ${e.message}`,'error',6000);
    }
  }

  async function extractAll(){
    const pending=queue.filter(x=>x.status==='pending');
    if(!pending.length)return;
    setProcessing(true);
    for(let i=0;i<pending.length;i++){
      if(i>0)await new Promise(r=>setTimeout(r,4000)); // 4s between docs to stay under 30k tok/min
      await extractItem(pending[i]);
    }
    setProcessing(false);
    showToast(`Processed ${pending.length} document${pending.length!==1?'s':''}`,'success');
  }

  function removeItem(id){
    setQueue(q=>q.filter(x=>x.id!==id));
    setResults(r=>{const n={...r};delete n[id];return n;});
  }
  function updateResult(id,r){setResults(prev=>({...prev,[id]:r}));}

  // Drag and drop
  function onDragOver(e){e.preventDefault();dropRef.current?.classList.add('active');}
  function onDragLeave(){dropRef.current?.classList.remove('active');}
  function onDrop(e){e.preventDefault();dropRef.current?.classList.remove('active');addFiles(e.dataTransfer.files);}

  // Export
  const reviewed=queue.filter(x=>x.status==='done'&&results[x.id]);
  const exportable=reviewed.filter(item=>{
    const r=results[item.id];
    if(r.docType==='other'||r.docType==='statement')return false;
    if(r.currency==='USD')return false;
    const isCC=r.docType==='cc_statement';
    const lines=isCC?(r.transactions||[]):(r.lines||[]);
    const total=isCC?r.balanceDue:r.invoiceTotal;
    const sum=lines.reduce((s,l)=>s+(parseFloat(l.amount)||0),0);
    return Math.abs(sum-total)<=0.05&&(r.overallConfidence||0)>=0.5;
  });
  const skipped=reviewed.filter(item=>{const r=results[item.id];return r.docType==='other'||r.docType==='statement';}).length;
  const usdBlocked=reviewed.filter(item=>results[item.id]?.currency==='USD').length;
  const balanceBlocked=reviewed.filter(item=>{
    const r=results[item.id];
    if(r.docType==='other'||r.docType==='statement'||r.currency==='USD')return false;
    const isCC=r.docType==='cc_statement';
    const lines=isCC?(r.transactions||[]):(r.lines||[]);
    const total=isCC?r.balanceDue:r.invoiceTotal;
    const sum=lines.reduce((s,l)=>s+(parseFloat(l.amount)||0),0);
    return Math.abs(sum-total)>0.05;
  }).length;
  const blocked=reviewed.length-exportable.length;

  async function handleSaveVendors(vendors){
    if(!token){showToast('Sign in first','error');return;}
    setVendorSaving(true);
    try{
      const tok=await getToken(account);setToken(tok);
      await saveCustomVendors(tok,vendors);
      setCustomVendors(vendors);
      showToast('Vendor list saved','success');
    }catch(e){showToast(`Vendor save error: ${e.message}`,'error',6000);}
    setVendorSaving(false);
  }

  async function handleUploadPdf(itemId, filename, r){
    if(!token){showToast('Sign in first','error');return;}
    if(r._uploadedPdf){showToast('Already uploaded','error');return;}
    const qItem=queue.find(x=>x.id===itemId);
    if(!qItem?.b64){showToast('No PDF data available','error');return;}
    try{
      const tok=await getToken(account);setToken(tok);
      const path=await uploadPdfToSharePoint(tok,qItem.b64,r,filename);
      updateResult(itemId,{...r,_uploadedPdf:true});
      const shortPath=path.split('/').slice(-4).join('/');
      showToast(`PDF uploaded: ${shortPath}`,'success',5000);
    }catch(e){showToast(`Upload error: ${e.message}`,'error',6000);}
  }

  async function handleAddCSV(itemId,r){
    if(!token){showToast('Sign in first','error');return;}
    if(r._addedToCSV){showToast('Already added — remove card to re-add','error');return;}
    try{
      const tok=await getToken(account);setToken(tok);
      const rows=buildCSV([r]).split('\r\n').slice(1).join('\r\n');
      const path=await appendToOneDrive(tok,rows);
      updateResult(itemId,{...r,_addedToCSV:true});
      showToast(`Added to OneDrive: ${path}`,'success',4000);
    }catch(e){showToast(`OneDrive error: ${e.message}`,'error',6000);}
  }

  function handleExport(){
    if(!exportable.length)return;
    const csv=buildCSV(exportable.map(item=>results[item.id]));
    const now=new Date();
    const date=now.toISOString().slice(0,10).replace(/-/g,'');
    const time=now.toTimeString().slice(0,5).replace(':','');
    downloadCSV(csv,`Hergott_AP_${date}_${time}.csv`);
    showToast(`Exported ${exportable.length} document${exportable.length!==1?'s':''} to IntelliDealer CSV`,'success');
  }

        </div>
        <div className="header-sep"/>
        <div className="header-nav">
          <div className="header-sub">AP Invoice Processor</div>
          <div style={{fontSize:'10px',color:'rgba(255,255,255,0.45)',fontFamily:"'DM Mono',monospace"}}>v0.4.0 build 20260410.008</div>
          <div className="header-spacer"/>
          {account&&<button onClick={()=>setShowVendorMgr(true)} style={{background:'rgba(255,255,255,0.15)',border:'1px solid rgba(255,255,255,0.3)',color:'#fff',padding:'5px 14px',borderRadius:4,fontSize:12,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,letterSpacing:'0.06em',cursor:'pointer',textTransform:'uppercase',whiteSpace:'nowrap'}}>Vendors {customVendors.length>0&&`(${customVendors.length})`}</button>}
          {account?(
            <div className="header-user"><span>{account.username}</span><button className="btn-sign-out" onClick={handleSignOut}>Sign Out</button></div>
          ):(
            <button className="btn-sign-in" onClick={handleSignIn}>Sign In with Microsoft</button>
          )}
        </div>
      </div>
      <div className="app-body">
        {/* ── Left Panel ── */}
        <div className="left-panel">
          <div className="tabs">
            <button className={`tab${tab==='outlook'?' active':''}`} onClick={()=>setTab('outlook')}>Outlook Inbox</button>
            <button className={`tab${tab==='drop'?' active':''}`} onClick={()=>setTab('drop')}>Drag &amp; Drop</button>
          </div>

          {tab==='outlook'&&(
            <div className="panel-section">
              {!account?(
                <div className="no-emails">Sign in to scan your Outlook inbox</div>
              ):(
                <>
                  <div className="folder-row">
                    <span style={{flex:1,fontSize:'11px',color:'#888',alignSelf:'center',fontStyle:'italic'}}>AP mailbox</span>
                    <button className="btn-scan" onClick={handleScan} disabled={scanning}>{scanning?<><span className="spin"/>Scanning</>:'Scan Now'}</button>
                  </div>
                  {emails.length===0&&!scanning&&(
                    <div className="no-emails">No unread emails with PDF attachments</div>
                  )}
                  {emails.length>0&&(
                    <>
                      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'5px 10px',borderBottom:'1px solid #E6E3DE',background:'#F5F3EF'}}>
                        <label style={{display:'flex',alignItems:'center',gap:6,fontSize:'11px',color:'#555',cursor:'pointer',fontWeight:600}}>
                          <input type="checkbox" style={{cursor:'pointer'}}
                            checked={checkedEmails.size===emails.length&&emails.length>0}
                            onChange={toggleCheckAll}/>
                          {checkedEmails.size===emails.length&&emails.length>0?'Uncheck All':'Check All'}
                          {checkedEmails.size>0&&<span style={{color:'#C41230'}}>({checkedEmails.size} selected)</span>}
                        </label>
                        {checkedEmails.size>0&&(
                          <button className="btn-scan" style={{padding:'3px 10px',fontSize:'11px'}}
                            onClick={addCheckedToQueue}>
                            Add {checkedEmails.size} to Batch
                          </button>
                        )}
                      </div>
                      <div className="email-list">
                        {emails.map(msg=>(
                          <div key={msg.id} className="email-item" onClick={()=>toggleCheck(msg.id)}
                            style={{background:checkedEmails.has(msg.id)?'#EDF7F1':''}}>
                            <input type="checkbox" style={{cursor:'pointer',flexShrink:0}}
                              checked={checkedEmails.has(msg.id)}
                              onChange={()=>toggleCheck(msg.id)}
                              onClick={e=>e.stopPropagation()}/>
                            <div className="email-info" style={{flex:1}}>
                              <div className="email-subject">{msg.subject||'(no subject)'}</div>
                              <div className="email-meta">{msg.from?.emailAddress?.name||msg.from?.emailAddress?.address} · {new Date(msg.receivedDateTime).toLocaleDateString('en-CA')}</div>
                            </div>
                            <span className="email-badge">📎 PDF</span>
                          </div>
                        ))}
                      </div>
                    </>
                  )}
                </>
              )}
            </div>
          )}

          {tab==='drop'&&(
            <div className="panel-section">
              <div className="drop-zone" ref={dropRef}
                onDragOver={onDragOver} onDragLeave={onDragLeave} onDrop={onDrop}
                onClick={()=>fileRef.current?.click()}>
                <div className="drop-zone-icon">📄</div>
                <div className="drop-zone-text">Drop invoice PDFs here</div>
                <div className="drop-zone-hint">Or click to browse files</div>
                <input ref={fileRef} type="file" accept=".pdf,application/pdf" multiple hidden
                  onChange={e=>{addFiles(e.target.files);e.target.value='';}}/>
              </div>
            </div>
          )}

          {/* Queue */}
          <div className="queue-wrap">
            <div className="queue-header">
              <span className="queue-label">Batch ({queue.length})</span>
              {pendingCount>0&&(
                <button className="btn-extract-all" onClick={extractAll} disabled={processing||scanning}>
                  {processing?<><span className="spin"/>Processing…</>:scanning?'Wait—scanning…':`Extract ${pendingCount}`}
                </button>
              )}
            </div>
            <div className="queue-list">
              {queue.length===0&&<div className="queue-empty">Add documents from Outlook or drag-and-drop</div>}
              {queue.map(item=>(
                <div key={item.id} className={`queue-item ${item.status}`}>
                  <span className="qi-icon">
                    {item.status==='pending'?'📄':item.status==='processing'?'⏳':item.status==='done'?'✅':'❌'}
                  </span>
                  <div className="qi-info">
                    <div className="qi-name">{item.name}</div>
                    <div className="qi-source">{item.source}</div>
                  </div>
                  <span className={`qi-status ${item.status}`}>
                    {item.status==='error'?'Error':item.status==='processing'?'…':item.status}
                  </span>
                  {item.status==='pending'&&(
                    <button className="btn-qi-extract" onClick={()=>extractItem(item)} disabled={scanning}>Extract</button>
                  )}
                  {item.status==='error'&&<button className="btn-qi-extract" style={{background:'#C0392B'}} onClick={()=>extractItem(item)}>Retry</button>}
                  <button className="btn-qi-remove" onClick={()=>removeItem(item.id)}>×</button>
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* ── Right Panel ── */}
        <div className="right-panel">
          {reviewed.length===0&&(
            <div className="empty-state">
              <div className="empty-icon">📋</div>
              <div className="empty-text">No documents extracted yet</div>
              <div className="empty-hint">Add PDFs from Outlook or drag-and-drop, then click Extract</div>
            </div>
          )}

          {reviewed.map(item=>(
            <ReviewCard key={item.id} item={item} result={results[item.id]}
              onUpdate={r=>updateResult(item.id,r)}
              onRemove={()=>removeItem(item.id)}
              onAddCSV={handleAddCSV} onReextract={()=>extractItem(item)} onUploadPdf={handleUploadPdf} extraVendors={customVendors}/>
          ))}

          {reviewed.length>0&&(
            <div className="export-bar">
              <div className="export-info">
                <strong>{exportable.length}</strong> ready to add to CSV
                {skipped>0&&<span style={{color:'#888'}}> · {skipped} skipped</span>}
                {usdBlocked>0&&<span className="blocked"> · {usdBlocked} USD (convert first)</span>}
                {balanceBlocked>0&&<span className="blocked"> · {balanceBlocked} unbalanced (fix GL)</span>}
                {blocked===0&&<span className="clear"> · All documents balanced</span>}
              </div>
            </div>
          )}
        </div>
      </div>

      <Toast toast={toast}/>
      {showVendorMgr&&<VendorManager onClose={()=>setShowVendorMgr(false)} customVendors={customVendors} onSave={handleSaveVendors} saving={vendorSaving}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
